<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discoss</title>
  <link rel="icon" type="image/gif" href="/catjam.gif">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06060b;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.07);
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --violet: #a78bfa;
      --rose: #f472b6;
      --violet-dark: #7c3aed;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      overflow: hidden;
    }

    /* ── Animated blobs ───────────────────────────────────────────────── */
    .blobs {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      will-change: transform;
    }
    .blob-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(109,40,217,0.5) 0%, transparent 70%);
      top: -200px; left: -150px;
      animation: b1 22s ease-in-out infinite;
    }
    .blob-2 {
      width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(244,63,94,0.3) 0%, transparent 70%);
      bottom: -150px; right: -100px;
      animation: b2 28s ease-in-out infinite;
    }
    .blob-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(139,92,246,0.25) 0%, transparent 70%);
      top: 40%; left: 55%;
      animation: b3 18s ease-in-out infinite;
    }

    @keyframes b1 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(80px,-60px) scale(1.08); }
      66%      { transform: translate(-40px,80px) scale(0.94); }
    }
    @keyframes b2 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%      { transform: translate(-70px,50px) scale(1.1); }
      70%      { transform: translate(50px,-30px) scale(0.92); }
    }
    @keyframes b3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-80px,60px) scale(1.12); }
    }

    /* ── Layout ───────────────────────────────────────────────────────── */
    main {
      position: relative; z-index: 1;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      gap: 0;
    }

    /* ── Glass card ───────────────────────────────────────────────────── */
    .card {
      background: var(--glass);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 48px 52px;
      width: 100%;
      max-width: 460px;
      display: flex; flex-direction: column;
      align-items: flex-start;
      gap: 0;
    }

    /* Icon mark */
    .mark {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--violet), var(--rose));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 0 32px rgba(167,139,250,0.3);
    }
    .mark svg { width: 26px; height: 26px; }

    /* Title */
    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--text-dim);
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: 36px;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--glass-border);
      margin-bottom: 28px;
    }

    /* Buttons */
    .actions {
      display: flex; flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 20px;
      border-radius: 14px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
      width: 100%;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--violet) 0%, var(--rose) 100%);
      color: #fff;
      box-shadow: 0 4px 24px rgba(167,139,250,0.25);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 32px rgba(167,139,250,0.4);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: rgba(255,255,255,0.05);
      color: var(--text-dim);
      border: 1px solid var(--glass-border);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.09);
      color: var(--text);
      border-color: rgba(255,255,255,0.14);
    }

    /* Footer */
    .footer {
      position: fixed; bottom: 24px;
      font-size: 0.72rem;
      color: var(--text-muted);
      z-index: 1;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

<div class="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<main>
  <div class="card">

    <div class="mark">
      <img src="/catjam.gif" alt="CatJam" style="width:52px;height:52px;border-radius:16px;display:block;object-fit:cover;">
    </div>

    <h1>Discoss</h1>
    <p class="tagline">Contrôle à distance de musique<br>pour votre serveur Discord.</p>

    <div class="divider"></div>

    <div class="actions">
      <a href="https://discord.com/oauth2/authorize?client_id=1482103262868934778&permissions=3164160&integration_type=0&scope=bot+applications.commands"
         target="_blank" rel="noopener" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.077.077 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Inviter sur un serveur
      </a>
      <a href="/dashboard" class="btn btn-ghost">
        Ouvrir le dashboard
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>

  </div>
</main>

<div class="footer">v2.0.0 &nbsp;·&nbsp; Discoss</div>

</body>
</html>
